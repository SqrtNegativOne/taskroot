<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>Taskroot</title>
  </head>
  <body>
    <div id="root">
      <style>
        body { margin: 0; background-color: #2c2d2d; color: #ececed; font-family: ui-sans-serif, system-ui, sans-serif; }
        .preloader { display: flex; height: 100vh; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 3px solid #4a4b4c; border-top-color: #f1b390; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div class="preloader">
        <div class="spinner"></div>
        <div style="margin-top: 16px; color: #7f8182; font-size: 0.9rem;">Starting app...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
