<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Day Column Widget – Prototype</title>
<style>
  :root {
    --bg: #0c0c0a;
    --ink: #deded9;
    --ink-soft: #555550;
    --line: #1e1e1c;
    --surface: #151513;
    --accent: #5070a8;
    --col-width: 280px;
    --tab-width: 28px;
    --hour-height: 60px;
    color-scheme: dark;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
  }

  /* ─── Fake desktop background so you can see the overlay ─── */
  .fake-desktop {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-size: 1.1rem;
    user-select: none;
  }

  /* ─── Widget shell: tab + panel ─── */
  .widget {
    position: fixed;
    top: 0;
    right: 0;
    height: 100vh;
    display: flex;
    z-index: 1000;
    pointer-events: none;
  }

  .tab {
    align-self: center;
    width: var(--tab-width);
    height: 80px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-right: none;
    border-radius: 6px 0 0 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: auto;
    color: var(--ink-soft);
    font-size: 14px;
    transition: color 150ms, background 150ms;
    flex-shrink: 0;
  }
  .tab:hover {
    color: var(--ink);
    background: var(--bg);
  }
  .tab .arrow {
    transition: transform 200ms ease;
  }
  .widget.open .tab .arrow {
    transform: rotate(180deg);
  }

  .panel {
    width: 0;
    overflow: hidden;
    background: var(--bg);
    border-left: 1px solid var(--line);
    transition: width 250ms cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: auto;
    display: flex;
    flex-direction: column;
  }
  .widget.open .panel {
    width: var(--col-width);
  }

  /* ─── Panel header ─── */
  .panel-header {
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .panel-header .date {
    font-size: 0.8rem;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .panel-header .day {
    font-size: 1.1rem;
    font-weight: 600;
  }

  /* ─── Timeline container ─── */
  .timeline-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }

  .timeline {
    position: relative;
    /* 24 hours * hour-height */
    height: calc(24 * var(--hour-height));
    min-width: var(--col-width);
  }

  /* ─── Hour lines ─── */
  .hour-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--line);
  }
  .hour-label {
    position: absolute;
    left: 8px;
    transform: translateY(-50%);
    font-size: 0.65rem;
    color: var(--ink-soft);
    font-variant-numeric: tabular-nums;
    user-select: none;
  }

  /* ─── Now line ─── */
  .now-line {
    position: absolute;
    left: 40px;
    right: 0;
    height: 2px;
    background: #cc5f54;
    z-index: 10;
  }
  .now-line::before {
    content: '';
    position: absolute;
    left: -5px;
    top: -4px;
    width: 10px;
    height: 10px;
    background: #cc5f54;
    border-radius: 50%;
  }

  /* ─── Event blocks ─── */
  .event {
    position: absolute;
    left: 44px;
    right: 8px;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 0.75rem;
    line-height: 1.3;
    overflow: hidden;
    cursor: default;
    border-left: 3px solid;
    min-height: 18px;
  }
  .event .event-name {
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .event .event-time {
    font-size: 0.65rem;
    opacity: 0.7;
  }

  /* Color palette for events */
  .event.color-blue    { background: #1e3a5f; border-color: #5090d0; color: #a8cef0; }
  .event.color-green   { background: #1a3a2a; border-color: #50a070; color: #a0d8b0; }
  .event.color-purple  { background: #2a1a3a; border-color: #8060b0; color: #c0a8e0; }
  .event.color-orange  { background: #3a2a1a; border-color: #c08040; color: #e0c0a0; }
  .event.color-red     { background: #3a1a1a; border-color: #c05050; color: #e0a0a0; }

  /* Overlapping events split the width */
  .event.overlap-1of2 { right: calc(50% + 4px); }
  .event.overlap-2of2 { left: calc(50% + 24px); }
</style>
</head>
<body>

<div class="fake-desktop">
  Your desktop — click the tab on the right →
</div>

<div class="widget" id="widget">
  <button class="tab" id="toggle" aria-label="Toggle day column">
    <span class="arrow">‹</span>
  </button>
  <div class="panel">
    <div class="panel-header">
      <div class="date" id="dateLabel"></div>
      <div class="day" id="dayLabel"></div>
    </div>
    <div class="timeline-scroll" id="timelineScroll">
      <div class="timeline" id="timeline"></div>
    </div>
  </div>
</div>

<script>
  const HOUR_PX = 60;
  const widget = document.getElementById('widget');
  const toggle = document.getElementById('toggle');
  const timeline = document.getElementById('timeline');
  const timelineScroll = document.getElementById('timelineScroll');
  const dateLabel = document.getElementById('dateLabel');
  const dayLabel = document.getElementById('dayLabel');

  // ── Toggle ──
  toggle.addEventListener('click', () => {
    const opening = !widget.classList.contains('open');
    widget.classList.toggle('open');
    if (opening) scrollToNow();
  });

  // ── Date header ──
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  dateLabel.textContent = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  dayLabel.textContent = days[now.getDay()];

  // ── Hour grid ──
  for (let h = 0; h < 24; h++) {
    const line = document.createElement('div');
    line.className = 'hour-line';
    line.style.top = `${h * HOUR_PX}px`;
    timeline.appendChild(line);

    const label = document.createElement('div');
    label.className = 'hour-label';
    label.style.top = `${h * HOUR_PX}px`;
    if (h === 0) label.textContent = '12 AM';
    else if (h < 12) label.textContent = `${h} AM`;
    else if (h === 12) label.textContent = '12 PM';
    else label.textContent = `${h - 12} PM`;
    timeline.appendChild(label);
  }

  // ── Now line ──
  const nowLine = document.createElement('div');
  nowLine.className = 'now-line';
  function updateNow() {
    const n = new Date();
    const mins = n.getHours() * 60 + n.getMinutes();
    nowLine.style.top = `${(mins / 60) * HOUR_PX}px`;
  }
  updateNow();
  timeline.appendChild(nowLine);
  setInterval(updateNow, 60000);

  function scrollToNow() {
    const n = new Date();
    const mins = n.getHours() * 60 + n.getMinutes();
    const px = (mins / 60) * HOUR_PX;
    timelineScroll.scrollTop = Math.max(0, px - timelineScroll.clientHeight / 3);
  }

  // ── Sample events (replace with real data) ──
  const events = [
    { name: 'Morning standup',     start: '09:00', end: '09:30', color: 'blue' },
    { name: 'Deep work: API auth', start: '09:30', end: '11:30', color: 'green' },
    { name: 'Lunch',               start: '12:00', end: '13:00', color: 'orange' },
    { name: '1:1 with Sam',        start: '13:30', end: '14:00', color: 'purple' },
    { name: 'Code review',         start: '14:00', end: '15:00', color: 'blue' },
    { name: 'Sprint retro',        start: '15:30', end: '16:30', color: 'red' },
    { name: 'Wrap up & notes',     start: '16:30', end: '17:00', color: 'green' },
  ];

  function timeToMinutes(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function formatTime(t) {
    const [h, m] = t.split(':').map(Number);
    const suffix = h < 12 ? 'AM' : 'PM';
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    return `${h12}:${String(m).padStart(2, '0')} ${suffix}`;
  }

  for (const ev of events) {
    const startMin = timeToMinutes(ev.start);
    const endMin   = timeToMinutes(ev.end);
    const topPx    = (startMin / 60) * HOUR_PX;
    const heightPx = ((endMin - startMin) / 60) * HOUR_PX;

    const el = document.createElement('div');
    el.className = `event color-${ev.color}`;
    el.style.top    = `${topPx}px`;
    el.style.height = `${heightPx}px`;
    el.innerHTML = `
      <div class="event-name">${ev.name}</div>
      ${heightPx >= 30 ? `<div class="event-time">${formatTime(ev.start)} – ${formatTime(ev.end)}</div>` : ''}
    `;
    timeline.appendChild(el);
  }

  // Auto-open on load for demo purposes
  setTimeout(() => {
    widget.classList.add('open');
    setTimeout(scrollToNow, 300);
  }, 500);
</script>

</body>
</html>
